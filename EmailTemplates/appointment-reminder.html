<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <style>
            @media screen and (max-width: 600px) {
                .container {
                    width: 100% !important;
                    padding: 0 15px !important;
                }
                .data-table {
                    padding: 15px !important;
                }
                .actions-container {
                    display: block !important;
                    width: 100% !important;
                    text-align: center !important;
                }
            }
        </style>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        "
    >
        <table
            border="0"
            cellpadding="0"
            cellspacing="0"
            width="100%"
            style="background-color: #f4f7f6"
        >
            <tr>
                <td
                    align="center"
                    style="padding: 40px 20px"
                >
                    <table
                        border="0"
                        cellpadding="0"
                        cellspacing="0"
                        width="600"
                        class="container"
                        style="
                            background-color: #ffffff;
                            border-radius: 8px;
                            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                            overflow: hidden;
                        "
                    >
                        <!-- Header -->
                        <tr>
                            <td
                                align="center"
                                style="padding: 40px 30px 30px; border-bottom: 1px solid #f0f0f0"
                            >
                                <h1
                                    style="
                                        margin: 0;
                                        font-size: 28px;
                                        font-weight: 800;
                                        letter-spacing: -0.5px;
                                    "
                                >
                                    <span style="color: #64748b">Samson</span>
                                    <span style="color: #0ea5e9">Dental</span>
                                </h1>
                            </td>
                        </tr>

                        <!-- Body Content -->
                        <tr>
                            <td style="padding: 40px 40px 20px">
                                <h2
                                    style="
                                        color: #0ea5e9;
                                        margin: 0 0 20px 0;
                                        font-size: 24px;
                                        font-weight: 600;
                                        text-align: center;
                                    "
                                >
                                    Appointment Reminder ⏰
                                </h2>
                                <p
                                    style="
                                        color: #475569;
                                        margin: 0 0 30px;
                                        font-size: 16px;
                                        line-height: 1.6;
                                        text-align: center;
                                    "
                                >
                                    Hi
                                    <strong>{{name}}</strong>,
                                    <br />
                                    This is a friendly reminder for your upcoming visit.
                                </p>

                                <!-- Data Box -->
                                <table
                                    border="0"
                                    cellpadding="0"
                                    cellspacing="0"
                                    width="100%"
                                    class="data-table"
                                    style="
                                        background-color: #f8fafc;
                                        border: 1px solid #e2e8f0;
                                        border-radius: 8px;
                                        padding: 25px;
                                        margin-bottom: 30px;
                                    "
                                >
                                    <tr>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                font-weight: 600;
                                                color: #64748b;
                                                width: 100px;
                                                border-bottom: 1px solid #e2e8f0;
                                            "
                                        >
                                            Service
                                        </td>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                color: #0f172a;
                                                font-weight: 500;
                                                border-bottom: 1px solid #e2e8f0;
                                            "
                                        >
                                            {{service}}
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                font-weight: 600;
                                                color: #64748b;
                                                border-bottom: 1px solid #e2e8f0;
                                            "
                                        >
                                            Date
                                        </td>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                color: #0f172a;
                                                font-weight: 500;
                                                border-bottom: 1px solid #e2e8f0;
                                            "
                                        >
                                            {{date}}
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                font-weight: 600;
                                                color: #64748b;
                                                border-bottom: 1px solid #e2e8f0;
                                            "
                                        >
                                            Time
                                        </td>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                color: #0f172a;
                                                font-weight: 500;
                                                border-bottom: 1px solid #e2e8f0;
                                            "
                                        >
                                            {{start_time}}
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                font-weight: 600;
                                                color: #64748b;
                                            "
                                        >
                                            Dentist
                                        </td>
                                        <td
                                            style="
                                                padding: 8px 0;
                                                font-size: 15px;
                                                color: #0f172a;
                                                font-weight: 500;
                                            "
                                        >
                                            {{dentist}}
                                        </td>
                                    </tr>
                                </table>

                                <!-- Actions (Reschedule/Cancel) -->
                                <div
                                    align="center"
                                    class="actions-container"
                                    style="margin-bottom: 30px"
                                >
                                    {{actionButtons}}
                                </div>
                            </td>
                        </tr>

                        <!-- Footer -->
                        <tr>
                            <td style="padding: 0 40px 40px">
                                <table
                                    border="0"
                                    cellpadding="0"
                                    cellspacing="0"
                                    width="100%"
                                    style="border-top: 1px solid #f0f0f0; padding-top: 30px"
                                >
                                    <tr>
                                        <td
                                            align="center"
                                            style="
                                                color: #64748b;
                                                font-size: 14px;
                                                line-height: 1.6;
                                                margin-bottom: 15px;
                                            "
                                        >
                                            <strong>📍 Location</strong>
                                            <br />
                                            7 Himalayan Rd, Tandang Sora, Quezon City
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            align="center"
                                            style="
                                                color: #94a3b8;
                                                font-size: 13px;
                                                line-height: 1.6;
                                                padding-top: 15px;
                                            "
                                        >
                                            {{footerNote}}
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
